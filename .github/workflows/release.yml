name: Release

on:
  push:
    branches: ["**"]
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: write

jobs:
  ci:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: web-ext lint
        run: >
          npx --yes web-ext lint --source-dir=.
          --ignore-files "LICENSE" ".github/**" ".git/**" "*.zip"

  release:
    name: Publish GitHub release
    needs: ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp manifest version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' manifest.json > "$tmp"
          mv "$tmp" manifest.json

      - name: Create release archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          zip -r "jira-ticket-copier-firefox-${TAG}.zip" . \
            --exclude '.git/*' \
            --exclude '.github/*' \
            --exclude '*.zip'
          echo "ARCHIVE=jira-ticket-copier-firefox-${TAG}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
