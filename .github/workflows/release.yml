name: Release

on:
  push:
    branches: ["**"]
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: write

jobs:
  ci:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: web-ext lint
        run: >
          npx --yes web-ext lint --source-dir=.
          --ignore-files "LICENSE" ".github/**" ".git/**" "*.zip"

  publish-dev:
    name: Publish rolling dev release
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create archive
        run: |
          zip -r "jira-ticket-copier-firefox-dev.zip" . \
            --exclude '.git/*' \
            --exclude '.github/*' \
            --exclude '*.zip'

      - name: Reset dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if curl -fsS -H "Authorization: Bearer $GH_TOKEN" \
               "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/dev" >/dev/null 2>&1; then
            release_id=$(curl -fsS -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/dev" | jq .id)
            curl -fsS -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          fi
          curl -fsS -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/refs/tags/dev" || true

      - name: Publish dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "dev (rolling)"
          body: |
            Rolling pre-release built from `main` at `${{ github.sha }}`.

            **Not a stable version.** This release is overwritten on every
            push to `main`. The download URL stays the same:
            `jira-ticket-copier-firefox-dev.zip`.
          prerelease: true
          make_latest: "false"
          files: jira-ticket-copier-firefox-dev.zip

  release:
    name: Publish GitHub release
    needs: ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp manifest version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' manifest.json > "$tmp"
          mv "$tmp" manifest.json

      - name: Create release archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          zip -r "jira-ticket-copier-firefox-${TAG}.zip" . \
            --exclude '.git/*' \
            --exclude '.github/*' \
            --exclude '*.zip'
          echo "ARCHIVE=jira-ticket-copier-firefox-${TAG}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
